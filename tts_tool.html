<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPT-SoVITS Pro: 批量工作台 (高性能版)</title>
    <style>
        :root {
            --primary: #006d77;
            --primary-2: #0a9396;
            --accent: #ee9b00;
            --success: #2a9d8f;
            --warning: #f4a261;
            --danger: #d64545;
            --ink: #1f2a37;
            --muted: #5c6b7a;
            --line: #d7e1e8;
            --surface: rgba(255, 255, 255, 0.9);
            --surface-strong: rgba(255, 255, 255, 0.98);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 22px;
            font-family: "Source Han Sans CN", "Microsoft YaHei UI", "PingFang SC", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(1000px 420px at -10% -20%, #d9f3f0 0%, transparent 60%),
                radial-gradient(900px 420px at 110% -20%, #fff1da 0%, transparent 58%),
                linear-gradient(160deg, #f3f8fb 0%, #edf4f6 45%, #f7fbfc 100%);
            min-height: 100vh;
        }

        .container { max-width: 1480px; margin: 0 auto; }
        .header-row { display: flex; justify-content: space-between; align-items: center; gap: 16px; }
        .header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
        .app-title { margin: 0; font-size: 1.4rem; letter-spacing: 0.2px; }
        .subtle { color: var(--muted); font-size: 0.92rem; margin-left: 12px; }

        .sticky-header {
            position: sticky;
            top: 0;
            z-index: 100;
            margin-bottom: 22px;
            padding: 14px 16px;
            background: var(--surface-strong);
            border: 1px solid rgba(215, 225, 232, 0.9);
            border-radius: 18px;
            backdrop-filter: blur(14px);
            box-shadow: 0 14px 30px rgba(21, 37, 54, 0.08);
        }

        .control-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
            gap: 18px;
            align-items: start;
        }

        .card {
            background: var(--surface);
            border-radius: 18px;
            box-shadow: 0 14px 28px rgba(17, 39, 56, 0.08);
            padding: 20px;
            margin-bottom: 18px;
            border: 1px solid rgba(215, 225, 232, 0.9);
            backdrop-filter: blur(8px);
            animation: cardIn .45s ease both;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 1.08rem;
            border-bottom: 1px solid #e5edf2;
            padding-bottom: 12px;
            margin-bottom: 14px;
            color: #0d3b47;
        }

        .section-dot {
            width: 9px;
            height: 9px;
            border-radius: 999px;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            box-shadow: 0 0 0 4px rgba(10, 147, 150, 0.14);
        }

        .input-group { margin-bottom: 12px; }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            margin-bottom: 5px;
            color: #4a5d70;
        }
        .label-required { color: #bf2f2f !important; }
        .label-target { color: var(--primary) !important; }

        .input-control {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #c8d6df;
            border-radius: 11px;
            font-size: 13px;
            color: #173246;
            background: #fdfefe;
            transition: border-color .2s, box-shadow .2s, transform .12s;
        }

        .input-control:focus {
            border-color: var(--primary-2);
            outline: none;
            box-shadow: 0 0 0 3px rgba(10, 147, 150, 0.16);
        }

        .input-row { display: flex; gap: 8px; align-items: center; }

        .file-drop-zone {
            border: 2px dashed #b8cddd;
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            background: linear-gradient(180deg, #f8fcff 0%, #f3f9fc 100%);
            cursor: pointer;
            position: relative;
            transition: all 0.25s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 78px;
        }
        .file-drop-zone strong { font-size: .93em; }
        .file-drop-zone small { font-size: .8em; color: #5b7082; margin-top: 4px; }
        .file-drop-zone.success-zone {
            border-color: #68b8aa;
            background: linear-gradient(180deg, #effcf8 0%, #e8f9f4 100%);
        }

        .file-drop-zone:hover {
            border-color: var(--primary-2);
            background: linear-gradient(180deg, #eef8fb 0%, #eaf6fa 100%);
            transform: translateY(-1px);
        }

        .file-drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        .group-card {
            background: var(--surface);
            border: 1px solid rgba(212, 224, 232, 0.95);
            border-radius: 16px;
            margin-bottom: 16px;
            overflow: hidden;
            box-shadow: 0 10px 24px rgba(17, 37, 53, 0.06);
        }

        .group-header {
            padding: 12px 15px;
            background: linear-gradient(180deg, #f7fbfc 0%, #f1f7fa 100%);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #deeaef;
            gap: 12px;
            flex-wrap: wrap;
        }

        .group-title {
            font-family: "Consolas", "Courier New", monospace;
            font-weight: 700;
            color: #335267;
            font-size: 1.01rem;
        }

        .task-list { max-height: 620px; overflow-y: auto; }
        .task-list::-webkit-scrollbar { width: 10px; }
        .task-list::-webkit-scrollbar-thumb { background: #c6d7e0; border-radius: 99px; border: 2px solid #f2f7fa; }
        .task-list::-webkit-scrollbar-track { background: #f6fafc; }
        .task-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 11px 14px;
            border-bottom: 1px solid #ebf2f6;
            font-size: 13px;
            transition: background .2s ease;
        }
        .task-row:last-child { border-bottom: none; }
        .task-row.done-row { background-color: #edf9f5; }
        .task-row:hover { background-color: #f8fcfe; }
        .task-row.playing { background-color: #eaf7f8; border-left: 4px solid var(--primary-2); }

        .col-id { width: 45px; font-family: monospace; color: #7a8d9d; font-weight: 700; flex-shrink: 0; margin-top: 5px; }
        .col-file { width: 210px; font-family: monospace; color: #4f6375; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; font-size: 12px; margin-top: 5px; }
        .col-text { flex: 1; display: flex; flex-direction: column; gap: 6px; min-width: 0; }
        .col-text input { width: 100%; padding: 7px; border: 1px solid #d0dde5; border-radius: 8px; font-size: 13px; }

        .trans-input {
            border-color: #9bc7c8 !important;
            background-color: #f2fbfb;
            color: #1c5558;
            font-size: 12px !important;
            display: none;
        }

        .trans-input:focus { border-color: var(--primary-2) !important; background-color: #fff; }

        .col-status { width: 90px; text-align: center; flex-shrink: 0; margin-top: 5px; }
        .col-action { width: 230px; text-align: right; display: flex; justify-content: flex-end; gap: 6px; flex-shrink: 0; align-items: center; margin-top: 2px; }

        .badge { padding: 4px 9px; border-radius: 14px; font-size: 11px; font-weight: 700; display: inline-block; white-space: nowrap; }
        .bg-secondary { background: #e5edf3; color: #5b7082; }
        .bg-success { background: #dff5ee; color: #18634f; }
        .bg-warning { background: #fff1da; color: #9a6512; }
        .bg-danger { background: #fbe6e6; color: #9b2f2f; }

        .btn {
            padding: 7px 13px;
            border: 1px solid transparent;
            border-radius: 12px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            color: white;
            transition: transform .15s ease, box-shadow .2s ease, background .2s;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            text-decoration: none;
        }

        .btn:hover { transform: translateY(-1px); }
        .btn-sm { font-size: 12px; padding: 5px 10px; border-radius: 10px; }
        .btn-primary { background: linear-gradient(135deg, var(--primary), var(--primary-2)); box-shadow: 0 8px 16px rgba(0, 109, 119, 0.2); }
        .btn-purple { background: linear-gradient(135deg, #3d5a80, #4f6d95); box-shadow: 0 8px 16px rgba(61, 90, 128, 0.18); }
        .btn-success { background: linear-gradient(135deg, #21867a, #2a9d8f); }
        .btn-warning { background: linear-gradient(135deg, #f7b267, var(--accent)); color: #3f2d07; }
        .btn-outline { background: #fff; border: 1px solid #c8d6df; color: #375168; }
        .btn-outline:hover { background: #f3f9fc; }

        .progress-bar { height: 4px; background: linear-gradient(90deg, #2a9d8f, #49bca7); width: 0%; transition: width 0.3s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            body { padding: 14px; }
            .header-row { flex-direction: column; align-items: flex-start; }
            .subtle { display: block; margin: 4px 0 0; }
            .col-file { width: 150px; }
            .col-action { width: 170px; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="sticky-header">
        <div class="header-row">
            <div>
                <h3 class="app-title">GPT-SoVITS Pro 工作台</h3>
                <span id="globalStats" class="subtle">等待配置...</span>
            </div>
            <div class="header-actions">
                <button class="btn btn-warning" onclick="exportPendingTasks()" title="仅导出 ja_ / en_ 前缀中未完成的台词到TXT文件">📝 导出待处理清单</button>
                <button class="btn btn-purple" id="btnScan" onclick="scanDirectory()" disabled>🔄 智能扫描与匹配</button>
            </div>
        </div>
    </div>

    <div class="control-grid">
            <div class="card">
            <div class="card-header"><span class="section-dot"></span>1. 模型加载控制台</div>
            <div class="input-group">
                <label>API 地址 (Base URL)</label>
                <input type="text" id="apiUrl" class="input-control" value="http://127.0.0.1:9880">
            </div>
            <div class="input-group">
                <label>GPT 模型路径 (.ckpt)</label>
                <div class="input-row">
                    <input type="text" id="gptModelPath" class="input-control" placeholder="D:\GPT-SoVITS\...\s1bert.ckpt">
                    <button class="btn btn-primary btn-sm" onclick="changeModel('gpt')">加载</button>
                </div>
            </div>
            <div class="input-group">
                <label>SoVITS 模型路径 (.pth)</label>
                <div class="input-row">
                    <input type="text" id="sovitsModelPath" class="input-control" placeholder="D:\GPT-SoVITS\...\s2G.pth">
                    <button class="btn btn-primary btn-sm" onclick="changeModel('sovits')">加载</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><span class="section-dot"></span>2. 推理参数配置</div>
            <div class="input-group">
                <label class="label-required">*参考音频路径 (绝对路径)</label>
                <input type="text" id="refPath" class="input-control" placeholder="D:\ref_audio\example.wav">
            </div>
            <div class="input-group">
                <label>参考音频对应的文本</label>
                <input type="text" id="promptText" class="input-control" placeholder="参考音频里的台词内容">
            </div>
            
            <div class="input-row">
                <div style="flex:1">
                    <label>参考语言 (Ref Lang)</label>
                    <select id="promptLang" class="input-control">
                        <option value="ja">日语 (ja)</option>
                        <option value="zh">中文 (zh)</option>
                        <option value="en">英语 (en)</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label class="label-target">目标语言 (Target Lang)</label>
                    <select id="textLang" class="input-control" disabled>
                        <option value="auto">自动按前缀判定 (ja_/loc_/en_)</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label>输出格式</label>
                    <select id="mediaType" class="input-control" onchange="saveConfig()">
                        <option value="aac">AAC</option>
                        <option value="wav">WAV</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header"><span class="section-dot"></span>3. 文件与导入设置</div>
            <div class="input-row" style="margin-bottom:15px;">
                <div class="file-drop-zone" id="luaZone" style="flex:1;">
                    <strong>📄 1. 导入配置 (Lua)</strong>
                    <small>E_config.lua</small>
                    <input type="file" id="luaFile" accept=".lua" onchange="handleLuaUpload(this)">
                </div>
                <div class="file-drop-zone" id="dirZone" style="flex:1; opacity: 0.6; pointer-events: none;">
                    <strong>📂 2. 输出目录</strong>
                    <small>选择 output 文件夹</small>
                    <button class="btn btn-purple btn-sm" style="margin-top:5px;" onclick="selectDirectory()">浏览</button>
                </div>
            </div>

            <div class="input-group" style="margin-top: 20px;">
                 <div class="file-drop-zone success-zone" style="min-height: 80px;">
                    <strong>📥 3. 导入翻译 TXT (自动匹配)</strong>
                    <small>系统会自动读取 txt 内容，仅匹配 ja_ 与 en_ 前缀组的待处理台词并填入翻译</small>
                    <input type="file" accept=".txt" onchange="handleTxtImport(this)">
                </div>
            </div>
        </div>
    </div>

    <div id="groupsContainer"></div>
</div>

<script>
    // 全局变量
    let groups = [];
    let dirHandle = null;
    let globalBatchDelay = null; 
    let activeAudio = null; // 用于管理当前播放的音频，避免重叠
    let activeAudioUrl = null; // 用于管理 URL 释放

    window.onload = () => {
        // 【修改点】：在数组中添加 'textLang'
        const keys = ['apiUrl', 'gptModelPath', 'sovitsModelPath', 'refPath', 'promptText', 'promptLang', 'textLang', 'mediaType'];
        keys.forEach(key => {
            const val = localStorage.getItem(key);
            if (key === 'textLang') {
                document.getElementById(key).value = 'auto';
                localStorage.setItem('textLang', 'auto');
            } else if (val) {
                document.getElementById(key).value = val;
            }
            
            // 绑定事件，改变时保存到本地存储
            const el = document.getElementById(key);
            if(el) {
                el.addEventListener('change', (e) => localStorage.setItem(key, e.target.value));
            }
        });
    };

    // ==========================================
    // 核心逻辑：按需播放音频 (解决内存溢出)
    // ==========================================
    async function playAudio(taskId) {
        // 1. 停止之前的播放并释放内存
        if (activeAudio) {
            activeAudio.pause();
            activeAudio = null;
        }
        if (activeAudioUrl) {
            URL.revokeObjectURL(activeAudioUrl);
            activeAudioUrl = null;
        }

        // 移除所有高亮
        document.querySelectorAll('.task-row').forEach(el => el.classList.remove('playing'));

        // 2. 查找任务和文件句柄
        let task;
        for (const g of groups) {
            task = g.tasks.find(t => t.id === taskId);
            if (task) break;
        }

        if (!task || !task.localHandle) {
            return alert("找不到音频文件，请重新生成或扫描。");
        }

        const btn = document.querySelector(`#action_${taskId} button`);
        const row = document.getElementById(`row_${taskId}`);
        const originalText = btn.innerText;
        btn.innerText = "⌛"; // 加载中图标

        try {
            // 3. 实时读取文件流
            const file = await task.localHandle.getFile();
            activeAudioUrl = URL.createObjectURL(file);
            activeAudio = new Audio(activeAudioUrl);
            
            // 4. 播放事件处理
            activeAudio.onended = () => {
                row.classList.remove('playing');
                btn.innerText = "▶️ 试听";
                URL.revokeObjectURL(activeAudioUrl); // 播放完立即释放
                activeAudioUrl = null;
            };

            activeAudio.onerror = (e) => {
                console.error("播放错误", e);
                alert("播放失败，文件可能已损坏。");
                btn.innerText = "▶️ 试听";
            };

            await activeAudio.play();
            row.classList.add('playing');
            btn.innerText = "⏹️"; 
            
            // 按钮变成停止键
            btn.onclick = () => {
                activeAudio.pause();
                row.classList.remove('playing');
                btn.innerText = "▶️ 试听";
                btn.onclick = () => playAudio(taskId); // 恢复点击事件
                URL.revokeObjectURL(activeAudioUrl);
                activeAudioUrl = null;
            };

        } catch (e) {
            console.error(e);
            alert("读取音频失败: " + e.message);
            btn.innerText = "▶️ 试听";
        }
    }


    // ==========================================
    // 导入翻译 TXT 核心逻辑
    // ==========================================
    async function handleTxtImport(input) {
        if (!input.files[0]) return;
        if (groups.length === 0) return alert("请先导入 Lua 配置文件！");

        const text = await input.files[0].text();
        const lines = text.split(/\r?\n/).map(l => l.trim());
        
        let currentGroupName = null;
        let successCount = 0;

        for (let i = 0; i < lines.length; i++) {
            const line = lines[i];
            if (!line) continue;

            const foundGroup = groups.find(g => g.name === line);
            if (foundGroup) {
                currentGroupName = isJaOrEnPrefix(line) ? line : null;
                continue;
            }

            if (line === "待处理台词") continue;

            if (currentGroupName) {
                const original = line;
                const group = groups.find(g => g.name === currentGroupName);
                if (!group) continue;
                const task = group.tasks.find(t => t.originalText === original);

                if (task) {
                    // 检查下一行作为翻译
                    if (i + 1 < lines.length) {
                        const nextLine = lines[i + 1];
                        if (nextLine && nextLine !== "待处理台词" && !groups.find(g => g.name === nextLine)) {
                            task.translatedText = nextLine;
                            
                            const inputEl = document.getElementById(`trans_${task.id}`);
                            if (inputEl) {
                                inputEl.value = nextLine;
                                inputEl.style.display = 'block'; 
                            }
                            successCount++;
                            i++; 
                        }
                    }
                }
            }
        }
        alert(`✅ 导入完成！\n成功匹配并填充了 ${successCount} 条翻译。`);
        input.value = ''; 
    }

    // ==========================================
    // 常规逻辑
    // ==========================================

    async function changeModel(type) {
        const apiUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
        let path, endpoint;
        if (type === 'gpt') { path = document.getElementById('gptModelPath').value; endpoint = '/set_gpt_weights'; } 
        else { path = document.getElementById('sovitsModelPath').value; endpoint = '/set_sovits_weights'; }

        if (!path) return alert("请先输入模型路径");
        const btn = event.target; const originalText = btn.innerText;
        btn.innerText = "加载中..."; btn.disabled = true;

        try {
            const resp = await fetch(`${apiUrl}${endpoint}?weights_path=${encodeURIComponent(path)}`);
            if (resp.ok) alert(`✅ ${type.toUpperCase()} 模型加载成功！`);
            else { const err = await resp.json(); alert(`❌ 加载失败: ${err.message}`); }
        } catch (e) { alert(`❌ API连接失败: ${e.message}`); } 
        finally { btn.innerText = originalText; btn.disabled = false; }
    }

    async function handleLuaUpload(input) {
        if (!input.files[0]) return;
        const text = await input.files[0].text();
        
        // 移除注释，防止注释内容干扰正则
        const cleanContent = text.replace(/--.*$/gm, '');

        // 【修正后的正则】
        // 1. E:add_audio(...) 部分：
        //    跳过前4个参数 (class, name, key, path_var)，
        //    捕获第5个参数 "([^"]+)" (文件前缀 match[1])，
        //    捕获第6个参数 (\d+) (数量 match[2])，
        //    .*?\) 允许第6个参数后面还有其他参数（如优先级数字），直到遇到右括号。
        // 2. add_subtext(...) 部分：
        //    匹配到 {([^}]+)\} (文本内容 match[3])，不再强制匹配行尾的右括号，从而兼容 :set_priority()
        const regex = /E:add_audio\s*\(\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*[^,]+,\s*"([^"]+)",\s*(\d+).*?\)\s*:\s*add_subtext\s*\(\s*"[^"]+",\s*\{([^}]+)\}/g;
        
        const container = document.getElementById('groupsContainer');
        container.innerHTML = ''; 
        groups = [];
        let index = 0, match;

        while ((match = regex.exec(cleanContent)) !== null) {
            const targetPrefix = match[1]; // 捕获组1：文件前缀
            const count = parseInt(match[2]); // 捕获组2：数量
            // 捕获组3：文本列表内容，按引号分割处理
            const texts = match[3].split(/["'],\s*["']/).map(t => t.replace(/^['"]|['"]$/g, '').trim());
            
            const tasks = [];
            for (let i = 0; i < texts.length; i++) {
                if (i >= count) break;
                // 生成两位数序号 (01, 02, ...)
                const suffix = (i + 1).toString().padStart(2, '0');
                tasks.push({
                    id: `t_${index}_${i}`,
                    fileName: `${targetPrefix}${suffix}`,
                    originalText: texts[i],
                    translatedText: "", 
                    status: 'pending',
                    localHandle: null
                });
            }
            const group = { id: `g_${index}`, index: index, name: targetPrefix, tasks: tasks };
            groups.push(group);
            renderGroup(group, container);
            index++;
        }
        
        if (groups.length === 0) {
            alert("⚠️ 未检测到有效配置行，请检查 Lua 文件格式是否正确。");
        } else {
            console.log(`成功导入 ${groups.length} 组数据`);
        }

        updateStats();
        const dirZone = document.getElementById('dirZone');
        dirZone.style.opacity = '1'; dirZone.style.pointerEvents = 'auto';
    }

    async function selectDirectory() {
        try {
            dirHandle = await window.showDirectoryPicker();
            document.getElementById('btnScan').disabled = false;
            await scanDirectory();
        } catch (e) { console.error(e); }
    }

    function sanitizeString(str) { return str.replace(/[^\w\u4e00-\u9fa5\u3040-\u309f\u30a0-\u30ff]/g, "").toLowerCase(); }
    function editDistance(s1, s2) {
        s1 = s1.toLowerCase(); s2 = s2.toLowerCase();
        let costs = new Array();
        for (let i = 0; i <= s1.length; i++) {
            let lastValue = i;
            for (let j = 0; j <= s2.length; j++) {
                if (i == 0) costs[j] = j;
                else {
                    if (j > 0) {
                        let newValue = costs[j - 1];
                        if (s1.charAt(i - 1) != s2.charAt(j - 1)) newValue = Math.min(Math.min(newValue, lastValue), costs[j]) + 1;
                        costs[j - 1] = lastValue; lastValue = newValue;
                    }
                }
            }
            if (i > 0) costs[s2.length] = lastValue;
        }
        return costs[s2.length];
    }
    function similarity(s1, s2) {
        let longer = s1, shorter = s2;
        if (s1.length < s2.length) { longer = s2; shorter = s1; }
        if (longer.length == 0) return 1.0;
        return (longer.length - editDistance(longer, shorter)) / parseFloat(longer.length);
    }

    function isJaOrEnPrefix(name) {
        const lower = (name || '').toLowerCase();
        return lower.startsWith('ja_') || lower.startsWith('en_');
    }

    function detectTextLangByPrefix(name) {
        const lower = (name || '').toLowerCase();
        if (lower.startsWith('ja_')) return 'ja';
        if (lower.startsWith('loc_')) return 'zh';
        if (lower.startsWith('en_')) return 'en';
        return 'ja';
    }

    async function scanDirectory() {
        if (!dirHandle) return;
        const mediaType = document.getElementById('mediaType').value;
        const btn = document.getElementById('btnScan');
        btn.innerText = "🔍 扫描中..."; btn.disabled = true;

        let renameCount = 0, existCount = 0;
        const dirFiles = []; 
        for await (const entry of dirHandle.values()) {
            if (entry.kind === 'file' && entry.name.endsWith(`.${mediaType}`)) dirFiles.push({ name: entry.name, handle: entry });
        }

        const textToAudioMap = new Map();
        const addToMap = (text, handle) => {
            const clean = sanitizeString(text);
            if (clean && !textToAudioMap.has(clean)) textToAudioMap.set(clean, handle);
        };

        // 1. 精确匹配文件名
        for (const group of groups) {
            for (const task of group.tasks) {
                const targetName = `${task.fileName}.${mediaType}`;
                const found = dirFiles.find(f => f.name === targetName);
                if (found) {
                    updateTaskStatus(task, 'done', found.handle);
                    existCount++;
                    addToMap(task.originalText, found.handle);
                }
            }
        }
        for (const f of dirFiles) addToMap(f.name.replace(`.${mediaType}`, ''), f.handle);

        const usedRawFiles = new Set(); 
        
        // 2. 相似度匹配与重命名
        for (const group of groups) {
            for (const task of group.tasks) {
                if (task.status === 'done') continue; 
                const targetName = `${task.fileName}.${mediaType}`;
                const cleanText = sanitizeString(task.originalText);
                let sourceHandle = textToAudioMap.get(cleanText);

                if (!sourceHandle && cleanText.length >= 2) {
                    let bestSim = 0;
                    for (const [key, handle] of textToAudioMap.entries()) {
                        const sim = similarity(cleanText, key);
                        if (sim > 0.85 && sim > bestSim) { bestSim = sim; sourceHandle = handle; }
                    }
                }
                if (sourceHandle) {
                    try {
                        const fileData = await sourceHandle.getFile();
                        const newHandle = await dirHandle.getFileHandle(targetName, {create:true});
                        const writable = await newHandle.createWritable();
                        await writable.write(fileData);
                        await writable.close();
                        updateTaskStatus(task, 'done', newHandle);
                        renameCount++;
                        if (sanitizeString(sourceHandle.name.replace(`.${mediaType}`, '')) === cleanText) usedRawFiles.add(sourceHandle.name);
                        addToMap(task.originalText, newHandle);
                    } catch(e) { console.error("复制失败", e); }
                }
            }
            updateGroupProgress(group);
        }
        
        // 清理原始文件（非 ja_loc 开头）
        for (const name of usedRawFiles) { if (!name.startsWith('ja_loc')) try { await dirHandle.removeEntry(name); } catch(e) {} }
        
        updateStats();
        btn.innerText = "🔄 智能扫描与匹配"; btn.disabled = false;
        alert(`扫描完成！\n✅ 现有/关联: ${existCount}\n🔄 复制并重命名: ${renameCount}`);
    }

    function exportPendingTasks() {
        if (groups.length === 0) return alert("请先导入 Lua 配置！");
        let content = ""; let pendingTotal = 0;
        for (const group of groups) {
            if (!isJaOrEnPrefix(group.name)) continue;
            const pendingTasks = group.tasks.filter(t => t.status !== 'done');
            if (pendingTasks.length > 0) {
                content += `${group.name}\n待处理台词\n`;
                for (const task of pendingTasks) content += `${task.originalText}\n`;
                content += `\n`; 
                pendingTotal += pendingTasks.length;
            }
        }
        if (pendingTotal === 0) return alert("🎉 所有任务均已完成，没有待处理内容！");
        const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url; a.download = `待处理台词清单_${new Date().toLocaleDateString().replace(/\//g,'-')}.txt`;
        document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
    }

    async function batchExportGroup(groupIndex) {
        const group = groups[groupIndex];
        const doneTasks = group.tasks.filter(t => t.status === 'done');
        if (doneTasks.length === 0) return alert("本组没有已完成的任务！");
        if (globalBatchDelay === null) {
             const delayStr = prompt("下载间隔(ms)", "100");
             if (delayStr === null) return; 
             globalBatchDelay = parseInt(delayStr) || 100;
        }
        const mediaType = document.getElementById('mediaType').value;
        for (let i = 0; i < doneTasks.length; i++) {
            try {
                const fileName = `${doneTasks[i].fileName}.${mediaType}`;
                const fileHandle = await dirHandle.getFileHandle(fileName);
                const file = await fileHandle.getFile();
                const url = URL.createObjectURL(file);
                const a = document.createElement('a');
                a.href = url; a.download = fileName;
                document.body.appendChild(a); a.click(); document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(url), 5000);
                if (i < doneTasks.length - 1) await new Promise(r => setTimeout(r, globalBatchDelay));
            } catch (err) { console.error("导出失败:", doneTasks[i].id, err); }
        }
    }

    function renderGroup(group, container) {
        const div = document.createElement('div');
        div.className = 'group-card';
        div.innerHTML = `
            <div class="progress-container"><div class="progress-bar" id="prog_${group.id}"></div></div>
            <div class="group-header">
                <span class="group-title">${group.name}</span>
                <div>
                    <span style="font-size:12px; color:#666; margin-right:10px;">${group.tasks.length} 条</span>
                    <button class="btn btn-outline btn-sm" onclick="batchExportGroup('${group.index}')">📦 批量导出</button>
                    <button class="btn btn-primary btn-sm" onclick="runGroup('${group.index}')">⚡ 批量生成</button>
                </div>
            </div>
            <div class="task-list">${group.tasks.map(t => renderTaskRow(t)).join('')}</div>
        `;
        container.appendChild(div);
    }

    function renderTaskRow(task) {
        const transDisplay = task.translatedText ? 'block' : 'none';
        return `
            <div class="task-row" id="row_${task.id}">
                <div class="col-id">#${task.fileName.slice(-2)}</div>
                <div class="col-file" title="${task.fileName}">${task.fileName}</div>
                <div class="col-text">
                    <input type="text" value="${task.originalText}" onchange="updateTaskText('${task.id}', this.value)">
                    <input type="text" class="trans-input" id="trans_${task.id}" value="${task.translatedText || ''}" style="display:${transDisplay}" placeholder="翻译结果" onchange="updateTranslatedText('${task.id}', this.value)">
                </div>
                <div class="col-status"><span class="badge bg-secondary" id="badge_${task.id}">待处理</span></div>
                <div class="col-action" id="action_${task.id}">
                    <button class="btn btn-outline btn-sm" onclick="runSingleTask('${task.id}')">生成</button>
                </div>
            </div>
        `;
    }

    function updateTaskText(taskId, val) { for(let g of groups) { let t = g.tasks.find(x => x.id === taskId); if(t) { t.originalText = val; break; } } }
    function updateTranslatedText(taskId, val) { for(let g of groups) { let t = g.tasks.find(x => x.id === taskId); if(t) { t.translatedText = val; break; } } }

    async function runSingleTask(taskId) {
        let task, group;
        for(let g of groups) { task = g.tasks.find(x => x.id === taskId); if(task) { group = g; break; } }
        if(!task || !dirHandle) return alert("请先选择保存文件夹！");

        updateTaskStatus(task, 'processing');
        try {
            // 优先使用导入的翻译文本，如果没有则使用原文
            let finalText = task.originalText;
            if (task.translatedText && task.translatedText.trim() !== "") {
                finalText = task.translatedText;
            }
            
            await generateAudio(task, finalText);
            updateGroupProgress(group);
            updateStats();
        } catch (err) { console.error(err); updateTaskStatus(task, 'error'); alert("错误: " + err.message); }
    }

    async function runGroup(groupIndex) {
        const group = groups[groupIndex];
        if (!dirHandle) return alert("请先选择保存文件夹！");
        for (const task of group.tasks) {
            if (task.status === 'done') continue;
            await runSingleTask(task.id); 
        }
    }

    async function generateAudio(task, textToSpeak) {
        const apiUrl = document.getElementById('apiUrl').value.replace(/\/$/, '');
        const mediaType = document.getElementById('mediaType').value;
        const refPath = document.getElementById('refPath').value;
        
        // 【修改点1】：获取用户选择的目标语言
        const targetLang = detectTextLangByPrefix(task.fileName);

        if(!refPath) throw new Error("参考音频路径不能为空！");

        const payload = {
            text: textToSpeak, 
            text_lang: targetLang, // 【修改点2】：这里不再是 "ja"，而是使用变量 targetLang
            ref_audio_path: refPath,
            prompt_text: document.getElementById('promptText').value,
            prompt_lang: document.getElementById('promptLang').value,
            media_type: mediaType, 
            text_split_method: "cut5", 
            streaming_mode: false, 
        };
        
        // ...后续代码保持不变...
        const resp = await fetch(`${apiUrl}/tts`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
        if (!resp.ok) throw new Error(`HTTP Error: ${resp.status}`);
        
        const blob = await resp.blob();
        const newFileHandle = await dirHandle.getFileHandle(`${task.fileName}.${mediaType}`, { create: true });
        const writable = await newFileHandle.createWritable();
        await writable.write(blob); await writable.close();
        
        updateTaskStatus(task, 'done', newFileHandle);
    }

    function updateTaskStatus(task, status, fileHandle) {
        task.status = status;
        // 保存文件句柄以供播放使用
        if (fileHandle) task.localHandle = fileHandle;

        const badge = document.getElementById(`badge_${task.id}`);
        const actionBox = document.getElementById(`action_${task.id}`);
        
        if (status === 'done') {
            badge.className = 'badge bg-success'; badge.innerText = '✅ 完成';
            // 重点修改：不再直接插入 <audio>，而是插入试听按钮
            actionBox.innerHTML = `
                <button class="btn btn-outline btn-sm" onclick="playAudio('${task.id}')">▶️ 试听</button>
                <button class="btn btn-outline btn-sm" onclick="runSingleTask('${task.id}')" title="重新生成">🔄</button>
            `;
        } else if (status === 'processing') { 
            badge.className = 'badge bg-warning'; badge.innerText = '🔊 合成中...'; 
        } else if (status === 'error') { 
            badge.className = 'badge bg-danger'; badge.innerText = '❌ 失败'; 
        }
    }

    function updateGroupProgress(g) { document.getElementById(`prog_${g.id}`).style.width = `${(g.tasks.filter(t => t.status === 'done').length / g.tasks.length) * 100}%`; }
    function updateStats() {
        const total = groups.reduce((a, g) => a + g.tasks.length, 0);
        const done = groups.reduce((a, g) => a + g.tasks.filter(t => t.status === 'done').length, 0);
        document.getElementById('globalStats').innerText = `进度: ${done} / ${total}`;
    }
</script>
